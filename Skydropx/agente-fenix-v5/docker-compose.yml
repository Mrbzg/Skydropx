version: "3.9"

# Stack para Fénix v5 — escala a 100K leads/mes
# Levantar: docker compose up -d
# Con proxies: docker compose --profile proxies up -d

services:
  searxng:
    image: searxng/searxng:latest
    container_name: fenix-searxng
    ports:
      - "8888:8080"
    environment:
      - INSTANCE_NAME=fenix-search
      - SEARXNG_BASE_URL=http://localhost:8888/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-cambiame-en-prod}
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, DAC_OVERRIDE]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: fenix-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fenix}
      POSTGRES_USER: ${POSTGRES_USER:-fenix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fenix_local_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fenix}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fenix-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tor:
    image: dperson/torproxy:latest
    container_name: fenix-tor
    ports:
      - "9050:9050"   # SOCKS5
      - "8118:8118"   # HTTP
    restart: unless-stopped
    profiles:
      - proxies

volumes:
  pgdata:
