################################################################
# Plan de ejemplo - ÚSALO COMO PLANTILLA
#
# Cómo correrlo:
#   python -m src.skill.cli fenix plans run plans/EJEMPLO.yaml
#
# Cómo crear tus propios plans:
#   1. Copia este archivo: cp plans/EJEMPLO.yaml plans/mi_campana.yaml
#   2. Edita los campos según tu necesidad
#   3. Corre con: fenix plans run plans/mi_campana.yaml
#
# IMPORTANTE: este es UN ATAJO MANUAL, NO un cron automático.
# El usuario decide cuándo correrlo.
################################################################

# === Metadata (para tu identificación, no afecta el pipeline) ===
name: "Demo - PyME ropa CDMX"
description: |
  Ejemplo de plan: leads de boutiques pequeñas de ropa en CDMX
  con enriquecimiento web ligero.

# === Campos OBLIGATORIOS ===
nicho: "ropa"               # ver data/nicho_scian.json para opciones
zona: "CDMX"                # estado, ciudad o 'nacional'
meta: 100                   # cuántos leads quieres

# === Campos OPCIONALES (todos tienen defaults sensatos) ===
modelo: "B2C"               # B2B | B2C | C2C | D2C | C2B (si no, el ICP classifier infiere)
canal: "web"                # web | social | marketplace | fisica | mixto
mode: "standard"            # quick(≤50) | standard(≤1K) | deep(≤10K) | enterprise(>10K)

sources:                    # cuáles fuentes activar (default: según mode)
  - denue
  # - mercadolibre          # descomenta si tienes OAuth ML configurado
  # - dorks
  # - camaras

scianes:                    # opcional: SCIANs específicos (si no, los infiere del nicho)
  - "4632"                  # ropa al por menor
  # - "4633"                # calzado (descomenta si quieres ambos)

estratos:                   # filtrar tamaño DENUE (1-7)
  - "1"                     # Micro (0-5 empleados)
  - "2"                     # Micro (6-10)
  - "3"                     # Pequeña (11-30)
  # - "4"                   # Pequeña (31-50)
  # - "5"                   # Mediana (51-100)

# === Enriquecimiento ===
enrich_max: 50              # # de webs a crawlear con Hunter (más = más lento)
deep_enrich_max: 0          # # de leads READY a procesar con OSINT profundo (0 = skip)
deep_enrich_tools:          # cuáles tools OSINT (solo si deep_enrich_max > 0)
  - holehe                  # verifica email en 100+ servicios
  # - maigret               # busca username en 3000 sitios
  # - phoneinfoga           # OSINT de teléfono

# === Output ===
format: "csv,json"          # csv | json | both

# === Overrides de exclusiones ===
include_large: false                # incluir Estrato 7 (251+ empleados)
include_medianas_grandes: false     # incluir Estrato 6 (101-250)

# === Extras avanzados (dorks customizados, etc.) ===
extras:
  # dork_categorias:        # categorías de dorks a usar (si sources incluye 'dorks')
  #   - envios_mx
  #   - shopify
  # dork_queries_extra:     # dorks adicionales custom
  #   - '"compra y gana" "mundial" site:.mx'

# === Tags (para tracking en el historial) ===
tags:
  - "ejemplo"
  - "ropa"
  - "cdmx"
  - "pyme"
